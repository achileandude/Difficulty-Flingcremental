<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stud Incremental</title>
    <style>
        /* Basic styling to make the game look clean */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: #fff;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .hidden {
            display: none;
        }
        .section {
            border: 1px solid #444;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            max-width: 500px;
            background-color: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Studs: <span id="stud-count">0</span></h1>
    <p>Studs per click: <span id="stud-gain">1</span></p>
    
    <button onclick="earnStuds()">Gather Studs</button>

    <div id="unlock-section" class="section">
        <h2>Difficulty Feature</h2>
        <p>Unlock the difficulty chart and upgrades.</p>
        <button id="btn-unlock" onclick="unlockDifficultyChart()">Unlock (Cost: 100 Studs)</button>
    </div>

    <div id="game-features" class="section hidden">
        <h2>Difficulty Level: <span id="difficulty-level">0</span></h2>
        <button id="btn-increase-diff" onclick="increaseDifficulty()">Increase Difficulty (Cost: 10000 Studs)</button>
        
        <hr style="border-color: #555; margin: 20px 0;">
        
        <h3>Upgrades</h3>
        <p>Multiplication Level: <span id="mult-level">0</span></p>
        <button id="btn-mult" onclick="buyMultiplicationUpgrade()">Buy Multiplication (Cost: 50)</button>

        <p>(Compounding) Multiplication Level: <span id="comp-level">0</span></p>
        <button id="btn-comp" onclick="buyCompoundingUpgrade()">Buy Compounding (Cost: 250)</button>
    </div>

    <script>
        // --- GAME STATE ---
        let gameData = {
            studs: 0,
            difficultyChartUnlocked: false,
            difficultyLevel: 0,
            upgrades: {
                multiplication: { level: 0, cost: 50, unlocked: false },
                compoundingMultiplication: { level: 0, cost: 250, unlocked: false }
            }
        };

        // --- LOGIC FUNCTIONS ---
        function calculateStudGain() {
            let baseGain = 1; 
            let addedMultiplier = gameData.upgrades.multiplication.level * 1;
            let linearTotal = baseGain + addedMultiplier;
            let compoundingMultiplier = Math.pow(2, gameData.upgrades.compoundingMultiplication.level);
            return linearTotal * compoundingMultiplier;
        }

        function earnStuds() {
            gameData.studs += calculateStudGain();
            updateUI(); // Immediately update screen when clicked
        }

        function unlockDifficultyChart() {
            if (!gameData.difficultyChartUnlocked && gameData.studs >= 100) {
                gameData.studs -= 100;
                gameData.difficultyChartUnlocked = true;
                gameData.upgrades.multiplication.unlocked = true;
                gameData.upgrades.compoundingMultiplication.unlocked = true;
                
                // Hide unlock section, show features section
                document.getElementById("unlock-section").classList.add("hidden");
                document.getElementById("game-features").classList.remove("hidden");
                updateUI();
            }
        }

        function increaseDifficulty() {
            let cost = 10000 * Math.pow(5, gameData.difficultyLevel); 
            if (gameData.difficultyChartUnlocked && gameData.studs >= cost) {
                gameData.studs -= cost;
                gameData.difficultyLevel++;
                updateUI();
            }
        }

        function buyMultiplicationUpgrade() {
            let upgrade = gameData.upgrades.multiplication;
            if (upgrade.unlocked && gameData.studs >= upgrade.cost) {
                gameData.studs -= upgrade.cost;
                upgrade.level++;
                upgrade.cost = Math.floor(upgrade.cost * 1.5);
                updateUI();
            }
        }

        function buyCompoundingUpgrade() {
            let upgrade = gameData.upgrades.compoundingMultiplication;
            if (upgrade.unlocked && gameData.studs >= upgrade.cost) {
                gameData.studs -= upgrade.cost;
                upgrade.level++;
                upgrade.cost = Math.floor(upgrade.cost * 3);
                updateUI();
            }
        }

        // --- UI UPDATE LOOP ---
        // This function syncs the visual HTML with the hidden JavaScript math
        function updateUI() {
            // Update Text
            document.getElementById("stud-count").innerText = gameData.studs;
            document.getElementById("stud-gain").innerText = calculateStudGain();
            document.getElementById("difficulty-level").innerText = gameData.difficultyLevel;
            document.getElementById("mult-level").innerText = gameData.upgrades.multiplication.level;
            document.getElementById("comp-level").innerText = gameData.upgrades.compoundingMultiplication.level;

            // Update Button Costs & States (Grey out if you can't afford)
            document.getElementById("btn-unlock").innerText = `Unlock (Cost: 100 Studs)`;
            document.getElementById("btn-unlock").disabled = gameData.studs < 100;

            let diffCost = 10000 * Math.pow(5, gameData.difficultyLevel);
            document.getElementById("btn-increase-diff").innerText = `Increase Difficulty (Cost: ${diffCost} Studs)`;
            document.getElementById("btn-increase-diff").disabled = gameData.studs < diffCost;

            let multCost = gameData.upgrades.multiplication.cost;
            document.getElementById("btn-mult").innerText = `Buy Multiplication (Cost: ${multCost})`;
            document.getElementById("btn-mult").disabled = gameData.studs < multCost;

            let compCost = gameData.upgrades.compoundingMultiplication.cost;
            document.getElementById("btn-comp").innerText = `Buy Compounding (Cost: ${compCost})`;
            document.getElementById("btn-comp").disabled = gameData.studs < compCost;
        }

        // Run this once at the start to set up the initial screen
        updateUI();
    </script>
</body>
</html>
