<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Difficulty Flingcremental</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="outlined-text">
      You have flung <span id="stud-display">0</span> Studs.
    </h1>
    <p class="outlined-text">Generating <span id="pps-display">0</span>/s</p>

    <div id="spike-section" style="visibility: hidden">
      <div id="spike-name" class="spike-header outlined-text">Locked</div>
      <div class="progress-container">
        <div id="ms-fill" class="progress-fill"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card" id="upg-base" onclick="buy('base')">
        <span class="u-title outlined-text">It ALL begins here.</span>
        <div class="u-stats outlined-text">
          <span id="lvl-base">0/10</span>
          <span id="cost-base">Free</span>
        </div>
      </div>

      <div class="card hidden" id="upg-boost" onclick="buy('boost')">
        <span class="u-title outlined-text">Fling Boost</span> <br />
        <span class="u-desc outlined-text"
          >Boost your fling speed by 1.35x per level.</span
        >
        <div class="u-stats outlined-text">
          <span id="lvl-boost">0/15</span>
          <span id="cost-boost">150</span>
        </div>
      </div>
    </div>

    <script src="ExpantaNum.js"></script>
    <script src="data.js"></script>
    <script src="format.js"></script>
    <script src="logic.js"></script>
    <script src="main.js"></script>
  </body>
</html>
